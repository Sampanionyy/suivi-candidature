version: '3.8'

x-api-common: &api-common
    build:
        context: ./api
        dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
        - ./api:/var/www/html
        - /var/www/html/vendor
        - /var/www/html/bootstrap/cache
    env_file:
        - ./api/.env
    depends_on:
        mysql:
            condition: service_healthy
        redis:
            condition: service_healthy
    networks:
        - suivi_candidature_network

services:
    mysql:
        image: mysql:8.0
        container_name: suivi_candidature_mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: root_password
            MYSQL_DATABASE: suivi_candidature_db
            MYSQL_USER: suivi_candidature_user
            MYSQL_PASSWORD: 123456789
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - suivi_candidature_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 3s
            retries: 10

    redis:
        image: redis:7-alpine
        container_name: suivi_candidature_redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        networks:
            - suivi_candidature_network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
        command: redis-server --appendonly yes

    api:
        <<: *api-common
        container_name: suivi_candidature_api
        volumes:
            - ./api:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/bootstrap/cache
            - storage_data:/var/www/html/storage/app/public
        entrypoint: >
            sh -c "
                php artisan config:clear &&
                php artisan route:clear &&
                php artisan view:clear &&
                php artisan storage:link --force &&
                php artisan migrate --force &&
                apache2-foreground
            "
        networks:
            - suivi_candidature_network

    scheduler:
        <<: *api-common
        container_name: suivi_candidature_scheduler
        command: >
            sh -c "
                while true; do
                    php artisan schedule:run --verbose --no-interaction &
                    sleep 60
                done
            "

    queue:
        <<: *api-common
        container_name: suivi_candidature_queue
        command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

    reverb:
        <<: *api-common
        container_name: suivi_candidature_reverb
        ports:
            - "6001:6001"
        command: php artisan reverb:start --host=0.0.0.0 --port=6001

    web:
        build:
            context: ./web
            dockerfile: Dockerfile
        container_name: suivi_candidature_web
        restart: unless-stopped
        volumes:
            - ./web:/app
            - /app/node_modules
        env_file:
            - ./web/.env
        networks:
            - suivi_candidature_network

    nginx:
        image: nginx:alpine
        container_name: suivi_candidature_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - storage_data:/var/www/storage:ro
        depends_on:
            - api
            - web
        networks:
            - suivi_candidature_network

volumes:
    mysql_data:
    redis_data:
    storage_data:

networks:
    suivi_candidature_network:
        driver: bridge