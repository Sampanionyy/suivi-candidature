apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-pvc
spec:
  accessModes:
    - ReadWriteMany  # ✅ Changé pour permettre le partage entre API et Nginx
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "suivi_candidature_db"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_KEY: "base64:45Ph2QC2TJidVcS45d2F2lbXBl2VedAmcGyIBpd+2n0="
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  DB_USERNAME: "suivi_candidature_user"
  DB_PASSWORD: "123456789"
---
# ✅ Job pour exécuter les migrations AVANT le déploiement
apiVersion: batch/v1
kind: Job
metadata:
  name: laravel-migration
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36  # ✅ Version avec netcat
        command: 
        - sh
        - -c
        - |
          echo "Waiting for MySQL..."
          until nc -z mysql 3306 2>/dev/null; do 
            echo "MySQL is unavailable - sleeping"
            sleep 5
          done
          echo "MySQL is up!"
          sleep 10
      containers:
      - name: migrate
        image: suivi-candidature-api:latest
        imagePullPolicy: Never
        command:
        - sh
        - -c
        - |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan storage:link --force
          php artisan migrate --force
        env:
        - name: DB_CONNECTION
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_CONNECTION
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_PORT
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_DATABASE
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_PASSWORD
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_ENV
        - name: APP_DEBUG
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_DEBUG
        - name: APP_KEY
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36  # ✅ Version avec netcat
        command: 
        - sh
        - -c
        - |
          echo "Waiting for MySQL..."
          until nc -z mysql 3306 2>/dev/null; do 
            echo "MySQL is unavailable - sleeping"
            sleep 5
          done
          echo "MySQL is up!"
          sleep 15  # ✅ Augmenté pour stabilité
      - name: wait-for-migration
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for migration job to complete..."
          sleep 20  # ✅ Attente des migrations
      containers:
      - name: api
        image: suivi-candidature-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_CONNECTION
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_CONNECTION
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_PORT
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_DATABASE
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_PASSWORD
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_ENV
        - name: APP_DEBUG
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_DEBUG
        - name: APP_KEY
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_KEY
        volumeMounts:
        - name: storage
          mountPath: /var/www/html/storage/app/public
        livenessProbe:
          httpGet:
            path: /api/health  # ⚠️ Créez cet endpoint dans Laravel
            port: 8080
          initialDelaySeconds: 60  # ✅ Augmenté
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health  # ⚠️ Créez cet endpoint dans Laravel
            port: 8080
          initialDelaySeconds: 30  # ✅ Augmenté
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP