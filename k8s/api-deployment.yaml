apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi  # Augmenté à 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "suivi_candidature_db"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_KEY: "base64:45Ph2QC2TJidVcS45d2F2lbXBl2VedAmcGyIBpd+2n0="
  APP_URL: "http://192.168.49.2:32361"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  DB_USERNAME: "suivi_candidature_user"
  DB_PASSWORD: "123456789"
---
# Job pour exécuter les migrations ET créer le dossier profile_photos
apiVersion: batch/v1
kind: Job
metadata:
  name: laravel-migration
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          echo "Waiting for MySQL..."
          until nc -z mysql 3306 2>/dev/null; do 
            echo "MySQL is unavailable - sleeping"
            sleep 5
          done
          echo "MySQL is up!"
          sleep 10
      containers:
      - name: migrate
        image: suivi-candidature-api:latest
        imagePullPolicy: Never
        command:
        - sh
        - -c
        - |
          echo "=== Starting migration setup ==="
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          
          echo "=== Creating storage directories ==="
          # Créer TOUS les répertoires nécessaires
          mkdir -p /shared-storage/profile_photos
          mkdir -p /var/www/html/storage/app/public/profile_photos
          
          # Créer le lien symbolique
          php artisan storage:link --force
          
          echo "=== Setting permissions ==="
          # Permissions sur le PVC
          chmod -R 777 /shared-storage
          
          # Permissions sur le storage local
          chmod -R 775 /var/www/html/storage
          chown -R www-data:www-data /var/www/html/storage
          
          echo "=== Running migrations ==="
          php artisan migrate --force
          
          echo "=== Migration completed ==="
          ls -la /shared-storage/
          ls -la /var/www/html/storage/app/public/
        env:
        - name: DB_CONNECTION
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_CONNECTION
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_PORT
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_DATABASE
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_PASSWORD
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_ENV
        - name: APP_DEBUG
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_DEBUG
        - name: APP_KEY
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_KEY
        - name: APP_URL
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_URL
        volumeMounts:
        - name: storage
          mountPath: /shared-storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: storage-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          echo "Waiting for MySQL..."
          until nc -z mysql 3306 2>/dev/null; do 
            echo "MySQL is unavailable - sleeping"
            sleep 5
          done
          echo "MySQL is up!"
          sleep 15
      - name: wait-for-migration
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for migration job to complete..."
          sleep 30
      - name: setup-storage
        image: suivi-candidature-api:latest
        imagePullPolicy: Never
        command:
        - sh
        - -c
        - |
          echo "=== Setting up storage ==="
          
          # Créer les répertoires
          mkdir -p /shared-storage/profile_photos
          mkdir -p /var/www/html/storage/app/public/profile_photos
          
          # Lien symbolique vers le PVC
          ln -sf /shared-storage/profile_photos /var/www/html/storage/app/public/profile_photos
          
          # Permissions
          chmod -R 777 /shared-storage
          chmod -R 775 /var/www/html/storage
          chown -R www-data:www-data /var/www/html/storage
          
          echo "=== Storage setup completed ==="
          ls -la /shared-storage/
          ls -la /var/www/html/storage/app/public/
        volumeMounts:
        - name: storage
          mountPath: /shared-storage
      containers:
      - name: api
        image: suivi-candidature-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_CONNECTION
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_CONNECTION
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_PORT
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: DB_DATABASE
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_PASSWORD
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_ENV
        - name: APP_DEBUG
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_DEBUG
        - name: APP_KEY
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_KEY
        volumeMounts:
        - name: storage
          mountPath: /shared-storage
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP