apiVersion: apps/v1
kind: Deployment
metadata: 
  name: react-deployment
spec: 
  replicas: 2
  selector: 
    matchLabels: 
      app: react-app
  template: 
    metadata: 
      labels: 
        app: react-app
    spec: 
      containers: 
        - name: suivi-candidature-web
          image: suivi-candidature-web:latest
          imagePullPolicy: Never
          ports: 
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              value: "http://laravel-service/api"